<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- borg — gold d20 on dark, Pirate Borg aesthetic -->
  <rect x="0" y="0" width="128" height="128" rx="26" fill="#0e0e11"/>
  <rect x="2.5" y="2.5" width="123" height="123" rx="23.5" fill="none" stroke="#f5b301" stroke-opacity="0.25" stroke-width="2"/>
  <g fill="none" stroke="#f5b301" stroke-width="4" stroke-linejoin="round" stroke-linecap="round">
    <!-- outer hexagon (the d20 silhouette) -->
    <polygon points="64,14 107,39 107,89 64,114 21,89 21,39" fill="#f5b301" fill-opacity="0.06"/>
    <!-- central top face -->
    <polygon points="64,32 88,80 40,80" fill="#f5b301" fill-opacity="0.16"/>
    <!-- facets / spokes -->
    <line x1="64" y1="32" x2="64" y2="14"/>
    <line x1="64" y1="32" x2="21" y2="39"/>
    <line x1="64" y1="32" x2="107" y2="39"/>
    <line x1="40" y1="80" x2="21" y2="89"/>
    <line x1="88" y1="80" x2="107" y2="89"/>
    <line x1="40" y1="80" x2="64" y2="114"/>
    <line x1="88" y1="80" x2="64" y2="114"/>
  </g>
</svg>
